name: Supabase Keep-Alive

# Pings each Supabase project on a schedule so the free-tier
# inactivity timer (auto-pause after 7 days of no DB activity)
# never expires. Runs every 2 days plus a manual trigger.

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping PanPhy Skill Builder
        continue-on-error: true
        env:
          URL: https://quvabaudrylulyvuqayu.supabase.co
          KEY: ${{ secrets.SUPABASE_ANON_KEY_SKILL_BUILDER }}
        run: |
          set -uo pipefail
          if [ -z "${KEY:-}" ]; then
            echo "::warning::Secret SUPABASE_ANON_KEY_SKILL_BUILDER not set — skipping"
            exit 0
          fi
          code=$(curl -sSL -o /tmp/body -w "%{http_code}" \
            "$URL/rest/v1/" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY") || {
              echo "::error::curl failed for skill-builder"
              exit 1
            }
          echo "skill-builder HTTP $code"
          if [ "$code" != "200" ]; then
            echo "--- response body ---"
            head -c 2000 /tmp/body || true
            echo
            echo "::error::skill-builder returned HTTP $code"
            exit 1
          fi

      - name: Ping PanPhy Games
        continue-on-error: true
        env:
          URL: https://ldkgodxalwuvkqygchns.supabase.co
          KEY: ${{ secrets.SUPABASE_ANON_KEY_GAMES }}
        run: |
          set -uo pipefail
          if [ -z "${KEY:-}" ]; then
            echo "::warning::Secret SUPABASE_ANON_KEY_GAMES not set — skipping"
            exit 0
          fi
          code=$(curl -sSL -o /tmp/body -w "%{http_code}" \
            "$URL/rest/v1/" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY") || {
              echo "::error::curl failed for games"
              exit 1
            }
          echo "games HTTP $code"
          if [ "$code" != "200" ]; then
            echo "--- response body ---"
            head -c 2000 /tmp/body || true
            echo
            echo "::error::games returned HTTP $code"
            exit 1
          fi
