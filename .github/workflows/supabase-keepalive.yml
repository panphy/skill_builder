name: Supabase Keep-Alive

# Pings each Supabase project on a schedule so the free-tier
# inactivity timer (auto-pause after 7 days of no DB activity)
# never expires. Runs every 2 days plus a manual trigger.

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping PanPhy Skill Builder
        env:
          URL: https://quvabaudrylulyvuqayu.supabase.co
          KEY: ${{ secrets.SUPABASE_ANON_KEY_SKILL_BUILDER }}
        run: |
          set -euo pipefail
          if [ -z "${KEY:-}" ]; then
            echo "::error::Secret SUPABASE_ANON_KEY_SKILL_BUILDER is not set"
            exit 1
          fi
          code=$(curl -sS -o /tmp/body -w "%{http_code}" \
            "$URL/rest/v1/" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY")
          echo "skill-builder HTTP $code"
          # PostgREST returns 200 with the OpenAPI spec, which requires
          # a real query against pg_catalog -> resets the inactivity timer.
          [ "$code" = "200" ]

      - name: Ping PanPhy Games
        env:
          URL: https://ldkgodxalwuvkqygchns.supabase.co
          KEY: ${{ secrets.SUPABASE_ANON_KEY_GAMES }}
        run: |
          set -euo pipefail
          if [ -z "${KEY:-}" ]; then
            echo "::error::Secret SUPABASE_ANON_KEY_GAMES is not set"
            exit 1
          fi
          code=$(curl -sS -o /tmp/body -w "%{http_code}" \
            "$URL/rest/v1/" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY")
          echo "games HTTP $code"
          [ "$code" = "200" ]
